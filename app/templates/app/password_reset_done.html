{% extends 'app/base.html' %}
{% block main-content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body p-5 text-center">
                    <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                    <h3 class="fw-bold mb-3">Đổi mật khẩu thành công!</h3>
                    <p class="text-muted mb-4">Mật khẩu của bạn đã được cập nhật an toàn. Bây giờ bạn có thể đăng nhập bằng mật khẩu mới.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg w-100 fw-bold">Tiến hành Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock main-content %}
