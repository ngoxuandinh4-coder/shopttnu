{% extends 'app/base.html' %}
{% block main-content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-key fa-3x text-warning mb-3"></i>
                        <h3 class="fw-bold">Tạo mật khẩu mới</h3>
                        <p class="text-muted">Vui lòng nhập mật khẩu mới của bạn bên dưới (ít nhất 8 ký tự).</p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>
                        <button class="btn btn-warning btn-lg w-100 fw-bold text-dark" type="submit">Đổi mật khẩu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
    input[type="password"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-top: 5px; }
    ul.errorlist { color: red; list-style: none; padding: 0; }
    .helptext { font-size: 0.85em; color: #6c757d; }
</style>
{% endblock main-content %}
