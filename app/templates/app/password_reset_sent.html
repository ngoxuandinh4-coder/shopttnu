{% extends 'app/base.html' %}
{% block main-content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body p-5 text-center">
                    <i class="fas fa-envelope-open-text fa-3x text-success mb-3"></i>
                    <h3 class="fw-bold mb-3">Kiểm tra hộp thư!</h3>
                    <p class="text-muted mb-4">Chúng tôi đã gửi một đường link đặt lại mật khẩu đến email của bạn. Vui lòng kiểm tra (kể cả trong mục Thư rác/Spam).</p>
                    <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 fw-bold">Quay lại Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock main-content %}
