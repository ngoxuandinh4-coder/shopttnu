{% extends 'app/base.html' %}
{% block main-content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body p-5 text-center">
                    <i class="fas fa-unlock-alt fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold mb-3">Quên mật khẩu?</h3>
                    <p class="text-muted mb-4">Nhập địa chỉ email của bạn, chúng tôi sẽ gửi link để đặt lại mật khẩu an toàn.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="text-start mb-3">
                            <label class="form-label text-muted fw-bold">Địa chỉ Email</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Nhập email của bạn..." required>
                        </div>
                        <button class="btn btn-primary btn-lg w-100 fw-bold" type="submit">Gửi link xác nhận</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock main-content %}
